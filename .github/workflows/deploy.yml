name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build with OpenNext
        run: npm run cf-build

      - name: Copy worker.js to _worker.js
        run: cp .open-next/worker.js .open-next/_worker.js

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy .open-next/ --project-name=muddy-sunset-8bed --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
