name: Deploy to Cloudflare Pages

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build with OpenNext
        run: npm run cf-build

      - name: Copy worker.js to _worker.js
        run: cp .open-next/worker.js .open-next/_worker.js

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy .open-next/ \
            --project-name=muddy-sunset-8bed \
            --branch="${{ github.head_ref || github.ref_name }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref.replace(/[/_]/g, '-');
            const url = `https://${branch}.muddy-sunset-8bed.pages.dev`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed: ${url}`
            });
